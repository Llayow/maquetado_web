<!DOCTYPE html> <!--Indica al navegador que este documento está usando HTML5. Es importante para que el navegador interprete correctamente el código.-->

<html lang="en"> <!--Es la etiqueta raíz de todo el documento HTML. 
El atributo lang="en" indica que el idioma principal es inglés (puedes cambiarlo a "es" si tu contenido está en español).-->





<head> <!--Contiene información sobre la página, pero no lo que se muestra directamente al usuario. Aquí van configuraciones importantes.-->


  <meta charset="UTF-8"> <!-- Define la codificación de caracteres. Permite usar acentos, ñ, emojis, etc., sin problemas.-->


  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página sea responsive (adaptable a celulares y tablets).
width=device-width: usa el ancho del dispositivo
initial-scale=1.0: nivel de zoom inicial-->


  <title>Document</title> <!--Define el título de la página. Es lo que aparece en la pestaña del navegador.-->


</head> <!-- Cierra la sección de encabezado -->





<body> <!-- Aquí va todo el contenido visible de la página: texto, imágenes, botones, enlaces, etc.-->
  
</body> <!-- Cierra el cuerpo del documento -->

</html> <!-- Cierra el documento HTML -->
